<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 390" width="250" height="390">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#152716"/>
      <stop offset="0.55" stop-color="#224f23"/>
      <stop offset="1" stop-color="#2f7531"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a140c"/>
      <stop offset="1" stop-color="#152716" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- কভার -->
  <rect width="250" height="390" fill="url(#cover)"/>
  <!-- বাঁ পাশে স্পাইনের ছায়া -->
  <rect width="26" height="390" fill="url(#spine)"/>

  <!-- ভেতরের ফ্রেম -->
  <rect x="22" y="18" width="210" height="354" fill="none" stroke="#a8cca9" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect x="28" y="24" width="198" height="342" fill="none" stroke="#a8cca9" stroke-opacity="0.25" stroke-width="1"/>

  <!-- উপরের অলংকরণ -->
  <g stroke="#e3b489" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M75 62 H175"/>
    <path d="M95 70 H155"/>
  </g>
  <circle cx="125" cy="46" r="3.2" fill="#e3b489"/>
  <path d="M113 46 h6 M131 46 h6" stroke="#e3b489" stroke-width="1.4" stroke-linecap="round"/>

  <!-- খোলা বই আইকন -->
  <g transform="translate(125,155)">
    <path d="M0 -28 C -14 -40 -44 -40 -54 -34 L -54 26 C -44 20 -14 20 0 32 C 14 20 44 20 54 26 L 54 -34 C 44 -40 14 -40 0 -28 Z"
          fill="#eef7ee" fill-opacity="0.14" stroke="#d5e8d5" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M0 -28 L 0 32" stroke="#d5e8d5" stroke-width="2.5"/>
    <g stroke="#a8cca9" stroke-width="1.7" stroke-linecap="round" opacity="0.8">
      <path d="M-42 -18 C -30 -22 -14 -21 -8 -17"/>
      <path d="M-42 -6 C -30 -10 -14 -9 -8 -5"/>
      <path d="M-42 6 C -30 2 -14 3 -8 7"/>
      <path d="M8 -17 C 14 -21 30 -22 42 -18"/>
      <path d="M8 -5 C 14 -9 30 -10 42 -6"/>
      <path d="M8 7 C 14 3 30 2 42 6"/>
    </g>
  </g>

  <!-- ব্র্যান্ড নাম -->
  <text x="125" y="248" text-anchor="middle" font-family="'Hind Siliguri','Noto Sans Bengali','Nirmala UI',sans-serif"
        font-size="26" font-weight="700" fill="#ffffff">NafahLife</text>
  <text x="125" y="272" text-anchor="middle" font-family="'Hind Siliguri','Noto Sans Bengali','Nirmala UI',sans-serif"
        font-size="12.5" fill="#a8cca9" letter-spacing="0.5">জ্ঞান অর্জনই সর্বোত্তম সম্পদ</text>

  <!-- নিচের বার্তা -->
  <g stroke="#a8cca9" stroke-opacity="0.5" stroke-width="1">
    <path d="M60 306 H190"/>
  </g>
  <text x="125" y="330" text-anchor="middle" font-family="'Hind Siliguri','Noto Sans Bengali','Nirmala UI',sans-serif"
        font-size="13" fill="#eef7ee">প্রচ্ছদ শীঘ্রই আসছে</text>

  <!-- নিচের অলংকরণ -->
  <circle cx="125" cy="352" r="2.4" fill="#e3b489"/>
  <path d="M105 352 h10 M135 352 h10" stroke="#e3b489" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
</svg>
