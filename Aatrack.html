<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>অর্ডার ট্র্যাক — আল আযীয বুকশপ</title>
    <meta name="theme-color" content="#0D1F44">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AAcommon.css">
    <script>!function(){var t=localStorage.getItem('alaziz_theme');if(t)document.documentElement.setAttribute('data-theme',t);}();</script>
    <style>
        /* ═══ AL AZIZ COLOR TOKENS ═══ */
        :root {
            --primary:#1B3A6B; --primary-dark:#0D1F44; --primary-light:#2550A0;
            --accent:#C9920A; --accent-light:#E6B800;
            --bg:var(--bg-body,#F3F4F8); --bg2:#E8ECF5; --card:rgba(255,255,255,0.9);
            --text:#1F2937; --text2:#6B7280; --border:rgba(27,58,107,0.14);
            --green:#1B3A6B; --green-light:#2550A0; --dark:#0D1F44;
            --red:#DC2626; --shadow:rgba(27,58,107,0.12);
        }
        [data-theme="dark"]{
            --bg:#0A1628; --bg2:#0D1F44; --card:rgba(13,31,68,0.9);
            --text:#E0E8F8; --text2:#8A9EC0; --border:rgba(201,146,10,0.18);
            --shadow:rgba(0,0,0,0.3);
        }

        body{-webkit-tap-highlight-color:transparent;font-family:'Hind Siliguri',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        /* NAVBAR */
        .navbar{background:var(--primary-dark);padding:0;border-bottom:2px solid rgba(201,146,10,0.35);position:sticky;top:0;z-index:100;}
        .navbar-top{display:flex;align-items:center;padding:12px 16px;gap:12px;height:56px;}
        .back-btn{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);color:#E0E8F8;border-radius:8px;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
        .back-btn:hover{background:rgba(201,146,10,0.25);border-color:var(--accent);}
        .navbar-title{flex:1;font-size:15px;font-weight:700;color:#E0E8F8;}
        .dark-pill{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);color:#E0E8F8;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
        .dark-pill:hover{background:rgba(201,146,10,0.25);}

        /* PAGE */
        .page-wrap{padding:16px;max-width:500px;margin:0 auto;padding-bottom:60px;}

        /* TABS */
        .track-tabs{display:flex;gap:8px;margin-bottom:16px;}
        .ttab{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-family:'Hind Siliguri',Arial,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
        .ttab.active{background:var(--primary-dark);color:#E6B800;border-color:rgba(201,146,10,0.5);}

        /* SEARCH BOX */
        .track-search{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 14px var(--shadow);border:1px solid var(--border);}
        .track-search h3{font-size:16px;margin-bottom:4px;color:var(--text);font-weight:700;}
        .track-search p{font-size:12px;color:var(--text2);margin-bottom:14px;}
        .track-input-row{display:flex;gap:8px;}
        .track-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:'Hind Siliguri',Arial,sans-serif;font-size:14px;outline:none;transition:.2s;}
        .track-input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(27,58,107,0.12);}
        .track-btn{padding:11px 18px;background:var(--primary-dark);color:#E6B800;border:1.5px solid rgba(201,146,10,0.4);border-radius:10px;font-family:'Hind Siliguri',Arial,sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
        .track-btn:hover{background:var(--primary);color:#fff;}

        /* ORDER CARDS */
        .my-order-item{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px var(--shadow);cursor:pointer;border:1.5px solid var(--border);transition:.2s;}
        .my-order-item:hover{border-color:var(--accent);}
        .my-order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
        .my-oid{font-size:13px;font-weight:800;color:var(--accent);}
        .my-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
        .my-info{font-size:12px;color:var(--text2);line-height:1.7;}

        /* ORDER DETAIL CARD */
        .order-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);margin-bottom:14px;display:none;border:1px solid var(--border);}
        .order-id-badge{display:inline-block;background:rgba(27,58,107,0.08);color:var(--primary);border:1.5px solid rgba(27,58,107,0.25);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:800;letter-spacing:1px;margin-bottom:14px;}
        [data-theme="dark"] .order-id-badge{background:rgba(201,146,10,0.10);color:#E6B800;border-color:rgba(201,146,10,0.35);}
        .order-info-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
        .order-info-row:last-child{border:none;}
        .order-info-row span:first-child{color:var(--text2);}
        .order-info-row span:last-child{font-weight:600;color:var(--text);}
        .order-total-val{color:var(--accent)!important;font-size:15px;}

        /* TIMELINE */
        .timeline{margin-top:20px;}
        .timeline-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em;}
        .tl-step{display:flex;gap:14px;margin-bottom:0;position:relative;}
        .tl-left{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
        .tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1;}
        .tl-dot.done{background:var(--primary-dark);color:#E6B800;}
        .tl-dot.active{background:var(--primary-dark);color:#E6B800;box-shadow:0 0 0 4px rgba(27,58,107,0.22);}
        .tl-dot.pending{background:var(--bg);border:2px solid var(--border);color:var(--text2);}
        .tl-line{width:2px;flex:1;background:var(--border);margin:2px 0;}
        .tl-line.done{background:var(--primary-dark);}
        .tl-right{padding:4px 0 20px;}
        .tl-label{font-size:14px;font-weight:700;color:var(--text);}
        .tl-label.pending-txt{color:var(--text2);}
        .tl-sub{font-size:11px;color:var(--text2);margin-top:2px;}

        /* ERROR / LOADING */
        .track-error{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:14px;color:#dc2626;font-size:13px;text-align:center;display:none;margin-bottom:14px;}
        [data-theme="dark"] .track-error{background:rgba(220,38,38,0.10);border-color:rgba(220,38,38,0.3);}
        .loading-spinner{text-align:center;padding:20px;color:var(--text2);font-size:13px;}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-top">
        <button class="back-btn" onclick="navigateTo('al_azliz_index.html')">‹</button>
        <span class="navbar-title">📦 অর্ডার ট্র্যাক করুন</span>
        <button class="dark-pill" onclick="toggleDark()" id="darkBtn">🌙</button>
    </div>
</nav>

<div class="page-wrap">

    <div class="track-tabs">
        <button class="ttab active" id="tab1" onclick="switchTab('id')">🔍 ID দিয়ে খুঁজুন</button>
        <button class="ttab" id="tab2" onclick="switchTab('phone')">📱 আমার অর্ডারসমূহ</button>
    </div>

    <!-- Search by Order ID -->
    <div id="panelId">
        <div class="track-search">
            <h3>📦 অর্ডার খুঁজুন</h3>
            <p>অর্ডার কনফার্মের পর আপনি যে ID পেয়েছেন সেটি লিখুন</p>
            <div class="track-input-row">
                <input class="track-input" id="trackInput" placeholder="যেমন: AA-ABC123" oninput="this.value=this.value.toUpperCase()">
                <button class="track-btn" onclick="searchOrder()">খুঁজুন</button>
            </div>
        </div>
        <div class="track-error" id="trackError">❌ এই ID দিয়ে কোনো অর্ডার পাওয়া যায়নি</div>
        <div class="order-card" id="orderCard">
            <div id="orderIdBadge" class="order-id-badge"></div>
            <div id="orderInfoRows"></div>
            <div class="timeline">
                <div class="timeline-title">অর্ডার অবস্থান</div>
                <div id="timelineSteps"></div>
            </div>
        </div>
        <div id="lastOrderHint" style="text-align:center;padding:10px;font-size:12px;color:var(--text2);"></div>
    </div>

    <!-- Search by Phone -->
    <div id="panelPhone" style="display:none;">
        <div class="track-search">
            <h3>📱 আমার সব অর্ডার</h3>
            <p>আপনার মোবাইল নম্বর দিয়ে সকল অর্ডার দেখুন</p>
            <div class="track-input-row">
                <input class="track-input" id="phoneInput" placeholder="01XXXXXXXXX" type="tel" maxlength="11">
                <button class="track-btn" onclick="searchByPhone()">দেখুন</button>
            </div>
        </div>
        <div class="track-error" id="phoneError">❌ এই নম্বরে কোনো অর্ডার পাওয়া যায়নি</div>
        <div id="myOrdersList"></div>
    </div>

</div>

<script>
const DB = 'https://gronthokanon-8573e-default-rtdb.firebaseio.com';

function escapeHTML(str){
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fbGet(path){
    const res = await fetch(DB + path + '.json', {method:'GET', headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
}

const STATUSES=[
    {key:'pending',   icon:'🕐', label:'অর্ডার গৃহীত',     sub:'আপনার অর্ডারটি আমরা পেয়েছি'},
    {key:'confirmed', icon:'✅', label:'অর্ডার কনফার্ম',    sub:'অর্ডার নিশ্চিত করা হয়েছে'},
    {key:'processing',icon:'📦', label:'প্যাকেজিং',         sub:'বই প্যাক করা হচ্ছে'},
    {key:'shipped',   icon:'🚚', label:'ডেলিভারিতে',        sub:'বই রওনা দিয়েছে'},
    {key:'delivered', icon:'🎉', label:'ডেলিভারি সম্পন্ন', sub:'আপনার কাছে পৌঁছে গেছে'},
];
const STATUS_LABELS={pending:'পেন্ডিং',confirmed:'কনফার্ম',processing:'প্যাকেজিং',shipped:'শিপড',delivered:'ডেলিভারড'};
const STATUS_COLORS={
    pending:'background:#fef3c7;color:#92400e;',
    confirmed:'background:#dbeafe;color:#1e40af;',
    processing:'background:#ede9fe;color:#5b21b6;',
    shipped:'background:#fff7ed;color:#9a3412;',
    delivered:'background:rgba(27,58,107,0.10);color:#1B3A6B;'
};

function switchTab(tab){
    const isId=tab==='id';
    document.getElementById('panelId').style.display=isId?'block':'none';
    document.getElementById('panelPhone').style.display=isId?'none':'block';
    document.getElementById('tab1').classList.toggle('active',isId);
    document.getElementById('tab2').classList.toggle('active',!isId);
}

async function searchOrder(){
    const id=document.getElementById('trackInput').value.trim();
    if(!id){showToast('অর্ডার ID লিখুন','#DC2626');return;}
    document.getElementById('trackError').style.display='none';
    document.getElementById('orderCard').style.display='none';
    try{
        const data = await fbGet('/orders/' + encodeURIComponent(id));
        if(!data){document.getElementById('trackError').style.display='block';return;}
        renderOrder(data);
    }catch(e){
        showToast('সংযোগ সমস্যা হয়েছে, আবার চেষ্টা করুন','#DC2626');
    }
}

async function searchByPhone(){
    const phone=document.getElementById('phoneInput').value.trim();
    if(!phone||!/^01[3-9]\d{8}$/.test(phone)){
        showToast('⚠️ সঠিক মোবাইল নম্বর দিন!','#DC2626');return;
    }
    document.getElementById('phoneError').style.display='none';
    document.getElementById('myOrdersList').innerHTML='<div class="loading-spinner">🔍 খোঁজা হচ্ছে...</div>';
    try{
        const idx = await fbGet('/phoneIndex/' + phone);
        if(!idx){
            document.getElementById('myOrdersList').innerHTML='';
            document.getElementById('phoneError').style.display='block';
            return;
        }
        const orderIds = Object.keys(idx);
        const results = await Promise.allSettled(
            orderIds.map(oid => fbGet('/orders/' + encodeURIComponent(oid)))
        );
        let orders = results
            .filter(r => r.status === 'fulfilled' && r.value !== null)
            .map(r => r.value);
        orders.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        if(!orders.length){
            document.getElementById('myOrdersList').innerHTML='';
            document.getElementById('phoneError').style.display='block';
            return;
        }
        renderMyOrders(orders);
    }catch(e){
        showToast('সংযোগ সমস্যা হয়েছে, আবার চেষ্টা করুন','#DC2626');
        document.getElementById('myOrdersList').innerHTML='';
    }
}

function renderMyOrders(orders){
    const el=document.getElementById('myOrdersList');
    el.innerHTML=orders.map(o=>`
        <div class="my-order-item" data-orderid="${escapeHTML(o.orderId)}" onclick="viewOrder(this.dataset.orderid)">
            <div class="my-order-top">
                <div class="my-oid">${escapeHTML(o.orderId)}</div>
                <span class="my-status" style="${STATUS_COLORS[o.status]||STATUS_COLORS.pending}">${STATUS_LABELS[o.status]||escapeHTML(o.status)}</span>
            </div>
            <div class="my-info">
                📚 ${escapeHTML(o.books)}<br>
                💰 <strong>${escapeHTML(o.total)}</strong> · 💳 ${escapeHTML(o.payment)}<br>
                🗓️ ${new Date(o.createdAt).toLocaleDateString('bn-BD')}
            </div>
        </div>
    `).join('');
}

function viewOrder(id){
    switchTab('id');
    document.getElementById('trackInput').value=id;
    searchOrder();
}
function fillLastOrder(id){document.getElementById('trackInput').value=id;}

function renderOrder(o){
    document.getElementById('orderIdBadge').innerText=o.orderId;
    const discRow=o.discount>0?`<div class="order-info-row"><span>ছাড় (${escapeHTML(o.coupon||'')})</span><span style="color:#dc2626;">-৳${o.discount}</span></div>`:'';
    document.getElementById('orderInfoRows').innerHTML=`
        <div class="order-info-row"><span>নাম</span><span>${(()=>{const n=o.name||'';return n.length>2?escapeHTML(n[0]+'*'.repeat(n.length-2)+n[n.length-1]):escapeHTML(n);})()}</span></div>
        <div class="order-info-row"><span>ফোন</span><span>${(()=>{const p=o.phone||'';return escapeHTML(p.length>5?p.slice(0,3)+'*'.repeat(p.length-5)+p.slice(-2):p);})()}</span></div>
        <div class="order-info-row"><span>ঠিকানা</span><span style="text-align:right;max-width:200px;">${escapeHTML(o.address)}</span></div>
        <div class="order-info-row"><span>পেমেন্ট</span><span>${escapeHTML(o.payment)}</span></div>
        <div class="order-info-row"><span>বই</span><span style="text-align:right;max-width:200px;">${escapeHTML(o.books)}</span></div>
        ${discRow}
        <div class="order-info-row"><span>মোট</span><span class="order-total-val">${escapeHTML(o.total)}</span></div>
    `;
    const curIdx=STATUSES.findIndex(s=>s.key===o.status);
    let html='';
    STATUSES.forEach((s,i)=>{
        const isDone=i<curIdx, isActive=i===curIdx;
        const dotClass=isDone?'done':isActive?'active':'pending';
        const labelClass=isDone||isActive?'':'pending-txt';
        const showLine=i<STATUSES.length-1;
        html+=`<div class="tl-step">
            <div class="tl-left">
                <div class="tl-dot ${dotClass}">${isDone?'✓':s.icon}</div>
                ${showLine?`<div class="tl-line ${isDone?'done':''}"></div>`:''}
            </div>
            <div class="tl-right">
                <div class="tl-label ${labelClass}">${s.label}</div>
                <div class="tl-sub">${s.sub}</div>
            </div>
        </div>`;
    });
    document.getElementById('timelineSteps').innerHTML=html;
    document.getElementById('orderCard').style.display='block';
}

window.onload=function(){
    const urlId=new URLSearchParams(window.location.search).get('id');
    const lastId=localStorage.getItem('alaziz_lastorder');
    if(urlId){
        document.getElementById('trackInput').value=urlId;
        searchOrder();
    } else if(lastId){
        document.getElementById('lastOrderHint').innerHTML=`আপনার সর্বশেষ অর্ডার: <strong style="color:var(--accent);cursor:pointer;" data-id="${escapeHTML(lastId)}" onclick="fillLastOrder(this.dataset.id)">${escapeHTML(lastId)}</strong>`;
    }
};
</script>
<script src="AAcommon.js"></script>
</body>
</html>
