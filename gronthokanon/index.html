<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>গ্রন্থকানন</title>

<style>
/* RESET */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'SolaimanLipi', Arial, sans-serif;
    background: #f8f9fa;
    color: #333;
}

/* HEADER */
header {
    background: #fff;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* LOGO */
.logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.logo-area img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}

/* BANNER */
.banner {
    max-width: 1200px;
    margin: 15px auto;
    padding: 0 10px;
}

.banner img {
    width: 100%;
    border-radius: 12px;
    display: none;
}

.banner img.active {
    display: block;
}

/* TITLE */
.section-title {
    text-align: center;
    margin: 20px 0;
    font-weight: bold;
}

/* GRID */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 0 15px;
    max-width: 1200px;
    margin: auto;
}

.grid-item {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.grid-item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.info {
    padding: 10px;
}

.price {
    color: red;
    font-weight: bold;
    margin: 5px 0;
}

.btn {
    display: inline-block;
    padding: 6px 12px;
    background: #27ae60;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    font-size: 12px;
}

/* INFO */
.info-section {
    background: #fff;
    margin: 20px;
    padding: 15px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <div class="logo-area">
        <img src="logo.jpeg">
        <h2>গ্রন্থকানন</h2>
    </div>
    <p>স্বল্প মূল্যে ইসলামিক বইয়ের নির্ভরযোগ্য প্রতিষ্ঠান</p>
</header>

<!-- BANNER -->
<div class="banner">
    <img src="cover.jpeg" class="active">
    <img src="cover2.jpg">
    <img src="cover3.jpg">
</div>

<div class="section-title">বইয়ের তালিকা</div>

<!-- PRODUCTS -->
<div class="grid-container">

    <div class="grid-item">
        <img src="https://i.ibb.co.com/2YdC04dV/para-1.webp">
        <div class="info">
            <h3>প্যারাডক্সিক্যাল সাজিদ</h3>
            <div class="price">৳ ২২০</div>
            <a class="btn" href="https://wa.me">অর্ডার</a>
        </div>
    </div>

    <div class="grid-item">
        <img src="https://i.ibb.co.com/8nybhthC/book-0003.webp">
        <div class="info">
            <h3>দোয়ার ডায়েরি</h3>
            <div class="price">৳ ২৩০</div>
            <a class="btn" href="https://wa.me">অর্ডার</a>
        </div>
    </div>

</div>

<!-- INFO -->
<div class="info-section">
<h3>ডেলিভারি তথ্য</h3>
<p>সারাদেশে হোম ডেলিভারি</p>
<p>ঢাকা 60 টাকা | বাইরে 90 টাকা</p>
</div>

<footer>
© 2024 গ্রন্থকানন
</footer>

<!-- SLIDER JS -->
<script>
let slides = document.querySelectorAll(".banner img");
let i = 0;

setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
}, 3000);
</script>

</body>
</html>
