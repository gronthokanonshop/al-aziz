<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="nafah-logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>বই খুঁজুন — NafahLife</title>
<link rel="canonical" href="https://nafahlife.com/Aafilter.html">
    <meta name="theme-color" content="#2a562b">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="preconnect" href="https://i.ibb.co"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AAcommon.css">
    <script>!function(){var t=localStorage.getItem('alaziz_theme');if(t)document.documentElement.setAttribute('data-theme',t);}();</script>
    <style>
        *{-webkit-tap-highlight-color:transparent;}
        body{font-family:'Noto Serif Bengali',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .navbar{background:#fff;color:#204521;border-bottom:1px solid var(--nav-border);position:sticky;top:0;z-index:100;}
        .navbar-top{display:flex;align-items:center;padding:10px 14px;gap:10px;height:54px;}
        .back-btn{background:var(--nav-icon-bg);border:1px solid var(--nav-icon-border);color:var(--nav-text);border-radius:var(--radius-md);width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
        .back-btn:hover{background:var(--nav-icon-hover);border-color:#204521;}
        .page-title{flex:1;font-size:15px;font-weight:700;color:#204521;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .navbar-icons{display:flex;align-items:center;gap:8px;flex-shrink:0;}
        .dark-pill{background:var(--nav-icon-bg);border:1px solid var(--nav-icon-border);color:var(--nav-text);border-radius:var(--radius-md);width:36px;height:36px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
        .dark-pill:hover{background:var(--nav-icon-hover);}
        .nav-btn{background:var(--nav-icon-bg);border:1px solid var(--nav-icon-border);color:var(--nav-text);border-radius:var(--radius-md);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:.2s;}
        .nav-btn:hover{background:var(--nav-icon-hover);}
        .nav-badge{position:absolute;top:-6px;right:-6px;background:var(--accent-light);color:var(--primary-dark);font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--primary-dark);}
        .navbar-search{padding:0 14px 10px;}
        .search-box{display:flex;align-items:center;gap:10px;background:var(--search-input-bg);border:1.5px solid var(--search-input-border);border-radius:var(--radius-md);padding:9px 14px;transition:.2s;}
        .search-box:focus-within{border-color:#204521;box-shadow:var(--shadow-sm);}
        .search-icon-box{width:26px;height:26px;background:var(--primary-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--nav-text);}
        .search-vline{width:1px;height:16px;background:var(--search-input-border);flex-shrink:0;}
        .search-input{flex:1;border:none;background:transparent;outline:none;font-size:13.5px;font-family:'Noto Serif Bengali',Arial,sans-serif;color:#204521;}
        .search-input::placeholder{color:var(--text2);}
        .search-clear{background:none;border:none;color:#204521;font-size:18px;cursor:pointer;display:none;line-height:1;padding:0;}
        .search-clear.show{display:block;}
        /* ফিল্টার ট্যাব + চিপ (গ্রন্থকাননের মতো) */
        .filter-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;max-width:1100px;margin:0 auto;}
        .filter-tabs::-webkit-scrollbar{display:none;}
        .ftab{padding:11px 18px;font-size:12.5px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:.2s;flex-shrink:0;}
        .ftab:hover{color:#2f7531;}
        .ftab.active{color:#2f7531;border-bottom-color:#2f7531;}
        .sub-chips{display:none;padding:10px 14px;gap:8px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1.5px solid var(--border);flex-wrap:nowrap;max-width:1100px;margin:0 auto;}
        .sub-chips::-webkit-scrollbar{display:none;}
        .sub-chips.show{display:flex;}
        .chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:rgba(121,176,123,0.10);color:#224f23;white-space:nowrap;transition:.2s;flex-shrink:0;}
        [data-theme="dark"] .chip{color:#a8cca9;}
        .chip.active{background:#2f7531;border-color:#2f7531;color:#fff;}
        .chip:hover:not(.active){border-color:#2f7531;color:#2f7531;}
        /* ফিল্টার বাটন + নিচ-থেকে-ওঠা drawer (গ্রন্থকাননের মতো) */
        .filter-open-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#224f23,#2f7531);color:#fff;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;border:none;font-family:'Noto Serif Bengali',Arial,sans-serif;}
        .filter-open-btn svg{width:13px;height:13px;}
        .filter-open-btn .fcount{background:rgba(255,255,255,.25);border-radius:999px;padding:0 7px;font-size:11px;min-width:18px;text-align:center;}
        .fd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;display:none;}
        .fd-overlay.open{display:block;}
        .filter-drawer{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--card-solid,#fff);border-radius:20px 20px 0 0;z-index:3001;transform:translateY(105%);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.2);}
        .filter-drawer.open{transform:translateY(0);}
        .fd-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);}
        .fd-head b{font-size:15px;color:var(--text);}
        .fd-close{background:none;border:none;font-size:24px;color:var(--text2);cursor:pointer;line-height:1;}
        .fd-body{overflow-y:auto;padding:12px 18px;flex:1;}
        .fd-sec{font-size:12px;font-weight:800;color:var(--text2);margin:10px 0 8px;letter-spacing:.4px;}
        .fd-opts{display:flex;flex-wrap:wrap;gap:7px;}
        .fd-opt{padding:7px 13px;border:1.5px solid var(--border);border-radius:999px;font-size:12px;font-weight:600;color:var(--text);background:var(--card);cursor:pointer;transition:.15s;}
        .fd-opt.on{background:#2f7531;color:#fff;border-color:#2f7531;}
        .fd-apply{margin:10px 18px 18px;padding:13px;background:linear-gradient(135deg,#224f23,#2f7531);color:#fff;border:none;border-radius:12px;font-family:'Noto Serif Bengali',Arial,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
        .filter-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none;max-width:1100px;margin:0 auto;}
        .filter-bar::-webkit-scrollbar{display:none;}
        .filter-label{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;flex-shrink:0;}
        .sort-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--card);color:var(--text2);border:1.5px solid var(--border);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;font-family:'Noto Serif Bengali',Arial,sans-serif;transition:.2s;flex-shrink:0;}
        .sort-chip:hover{border-color:#204521;color:#204521;}
        .sort-chip.active{background:var(--primary-dark);color:#fff;border-color:#fff;}
        .sort-chip svg{width:14px;height:14px;flex-shrink:0;}
        .result-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 6px;max-width:1100px;margin:0 auto;}
        .section-title{font-size:15px;font-weight:700;color:var(--dark);padding-left:10px;border-left:3px solid var(--accent);display:flex;align-items:center;gap:6px;}
        .section-title svg{width:16px;height:16px;flex-shrink:0;}
        .result-count{font-size:12px;color:var(--text2);font-weight:600;background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:999px;white-space:nowrap;}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:10px 14px;max-width:1100px;margin:0 auto;}
        @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}.book-card img{height:155px;}}
        .book-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;position:relative;border:1px solid var(--border);animation:cardIn 0.3s ease both;}
        .book-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);border-color:#204521;}
        .book-card img{width:100%;height:175px;object-fit:cover;display:block;}
        .disc-badge{position:absolute;top:7px;left:7px;background:var(--danger);color:white;font-size:10px;font-weight:bold;padding:2px 7px;border-radius:999px;z-index:2;box-shadow:var(--shadow-sm);}
        .wl-btn{position:absolute;top:7px;right:7px;background:rgba(255,255,255,0.92);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:var(--shadow-sm);transition:.2s;}
        .wl-btn:hover{transform:scale(1.2);}
        .wl-btn.active{background:var(--red-bg);}
        .bc-info{padding:8px 9px 9px;}
        .bc-pub{font-size:10px;color:var(--text2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .bc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.45;height:36px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
        .bc-author{font-size:11px;color:var(--text2);margin-bottom:5px;}
        .price-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
        .price-sell{color:var(--danger);font-weight:bold;font-size:13px;}
        .price-orig{color:var(--text2);font-size:11px;text-decoration:line-through;}
        .bc-btn{display:block;padding:6px;background:linear-gradient(135deg,#cf6f33,#a85320);color:#fff;border-radius:var(--radius-md);cursor:pointer;width:100%;border:none;font-weight:bold;font-size:11px;text-align:center;font-family:'Noto Serif Bengali',Arial,sans-serif;transition:.2s;box-shadow:var(--shadow-sm);}
        .bc-btn:hover{background:var(--primary);transform:translateY(-1px);}
        .skel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px 14px;max-width:1100px;margin:0 auto;}
        @media(max-width:480px){.skel-grid{grid-template-columns:repeat(2,1fr);}}
        .skel-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
        .skel-img{height:175px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
        [data-theme="dark"] .skel-img{background:linear-gradient(90deg,var(--bg2) 25%,var(--primary) 50%,var(--bg2) 75%);background-size:200% 100%;}
        .skel-line{height:11px;margin:9px;border-radius:var(--radius-sm);background:linear-gradient(90deg,var(--bg2) 25%,var(--bg) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
        [data-theme="dark"] .skel-line{background:linear-gradient(90deg,var(--bg2) 25%,var(--primary) 50%,var(--bg2) 75%);background-size:200% 100%;}
        .skel-line.s{width:60%;}
        .empty-state{text-align:center;padding:70px 30px;}
        .empty-icon{margin-bottom:14px;animation:float 2.5s ease-in-out infinite;color:var(--text3);display:flex;justify-content:center;}
        .empty-icon svg{width:56px;height:56px;}
        .empty-title{font-size:17px;font-weight:700;color:var(--dark);margin-bottom:6px;}
        .empty-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
        .empty-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#cf6f33,#a85320);color:#fff;border-radius:999px;cursor:pointer;font-weight:700;font-size:14px;font-family:'Noto Serif Bengali',Arial,sans-serif;border:1.5px solid var(--accent);transition:.2s;}
        .empty-btn:hover{transform:translateY(-2px);}
        .empty-btn svg{width:16px;height:16px;}
        .float-cart{position:fixed;bottom:24px;left:16px;background:linear-gradient(135deg,#cf6f33,#a85320);color:#fff;padding:11px 18px;border-radius:999px;cursor:pointer;font-weight:700;box-shadow:var(--shadow-lg);z-index:997;font-family:'Noto Serif Bengali',Arial,sans-serif;display:flex;align-items:center;gap:10px;font-size:14px;transition:.2s;border:1.5px solid var(--accent);}
        .float-cart:hover{transform:translateY(-2px);}
        .scroll-top{position:fixed;bottom:24px;right:16px;background:linear-gradient(135deg,#cf6f33,#a85320);color:#fff;border:1.5px solid var(--accent);width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:998;transition:.2s;}
        .scroll-top.show{display:flex;}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:9999;box-shadow:var(--shadow-lg);border:1px solid var(--accent);animation:toastIn 0.3s ease;}
.search-box{background:#fff!important;border:1.5px solid #dfeae5!important}
.search-input{color:#000!important;font-weight:600}
.search-input::placeholder{color:#666}
.search-icon-box{background:#e7f0ec!important;color:#2f7531!important}
.search-vline{background:#dfeae5!important}
.page-title{color:#000!important;font-weight:800}
.section-title{color:var(--text)!important}
.bc-name{color:var(--text)!important}
.filter-layout{display:block;padding:0 12px;max-width:1100px;margin:0 auto}
.cat-sidebar{display:none}
.cat-sidebar-title{font-size:12px;font-weight:800;color:var(--text);padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.cat-item{display:block;width:100%;text-align:right;padding:8px 10px;font-size:12px;font-weight:600;color:var(--text);background:none;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Serif Bengali',Arial,sans-serif;margin-bottom:2px;line-height:1.45;transition:.15s}
.cat-item:hover{background:rgba(121,176,123,0.14)}
.cat-item.active{background:linear-gradient(135deg,#224f23,#2f7531);color:#fff;font-weight:700}
.cat-count{font-size:10px;opacity:.65;margin-right:3px}
.subcat-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:4px 6px 8px;justify-content:flex-end}
.subcat-item{font-size:11px;font-weight:600;color:var(--text);background:rgba(121,176,123,0.12);border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:'Noto Serif Bengali',Arial,sans-serif;transition:.15s}
.subcat-item:hover{background:rgba(121,176,123,0.24)}
.subcat-item.active{background:#2f7531;color:#fff;border-color:#2f7531}
.filter-main{flex:1;min-width:0}
.filter-main .grid{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))!important;padding:10px 0!important}
.pagination{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:18px 0 90px}
.page-btn{min-width:34px;height:34px;padding:0 9px;border:1.5px solid var(--border);background:var(--card-solid);color:var(--text);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Noto Serif Bengali',Arial,sans-serif;transition:.15s}
.page-btn:hover:not(:disabled){border-color:#2f7531}
.page-btn.active{background:linear-gradient(135deg,#224f23,#2f7531);color:#fff;border-color:#2f7531}
.page-btn:disabled{opacity:.4;cursor:default}
.page-ellipsis{min-width:18px;text-align:center;color:#999;align-self:flex-end;padding-bottom:6px}
@media(max-width:480px){.cat-sidebar{width:116px;top:110px}.filter-layout{gap:8px;padding:0 8px}}
.navbar-icons svg,.search-icon-box svg,.section-title svg,.result-bar svg,.filter-bar svg{stroke:#000!important;color:#000!important;stroke-width:2.6!important}
.search-icon-box{color:#000!important}
.back-btn{color:#000!important;font-weight:800}
.nav-btn,.dark-pill{color:#000!important}
.sort-select-wrap{position:relative;display:inline-flex;align-items:center}
.sort-select{appearance:none;-webkit-appearance:none;-moz-appearance:none;background:var(--card-solid);color:var(--text);font-weight:700;font-size:13px;font-family:'Noto Serif Bengali',Arial,sans-serif;border:1.5px solid var(--border);border-radius:999px;padding:7px 34px 7px 14px;cursor:pointer;outline:none}
.sort-select:focus{border-color:#2f7531}
.sort-arrow{position:absolute;right:11px;width:16px;height:16px;pointer-events:none}
</style>
</head>
<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;">NafahLife — বইয়ের তালিকা ও ক্যাটাগরি</h1>
<nav class="navbar">
    <div class="navbar-top">
        <div style="flex:1;display:flex;align-items:center;gap:8px;min-width:0;">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="page-title" id="pageTitle">বই খুঁজছি...</div>
        </div>
        <div class="navbar-icons">
            <button class="dark-pill" onclick="toggleDark()" id="darkBtn"><svg class="emi" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
            <div class="nav-btn" onclick="goToCart()" title="কার্ট">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span class="nav-badge" id="cartCount">0</span>
            </div>
        </div>
    </div>
    <div class="navbar-search">
        <div class="search-box">
            <div class="search-icon-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
            <div class="search-vline"></div>
            <input type="text" class="search-input" id="filterSearch" oninput="searchWithin()" placeholder="এই তালিকায় খুঁজুন...">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
        </div>
    </div>
</nav>
<!-- ফিল্টার ট্যাব (গ্রন্থকাননের মতো): সকল / ক্যাটাগরি / প্রকাশনী / লেখক -->
<div class="filter-tabs" id="filterTabs">
    <div class="ftab active" onclick="setFilterTab(this,'all')">সকল</div>
    <div class="ftab" onclick="setFilterTab(this,'cat')">ক্যাটাগরি</div>
    <div class="ftab" onclick="setFilterTab(this,'pub')">প্রকাশনী</div>
    <div class="ftab" onclick="setFilterTab(this,'auth')">লেখক</div>
</div>
<div class="sub-chips" id="subChips"></div>
<div class="filter-layout">
<div class="filter-main">
<div class="filter-bar">
    <button class="filter-open-btn" onclick="openFilterDrawer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> ফিল্টার <span class="fcount" id="filterCount" style="display:none;">০</span></button>
    <span class="filter-label">সাজান:</span>
    <div class="sort-select-wrap">
      <select class="sort-select" id="sortSelect" onchange="sortBooksSel(this.value)">
        <option value="default">ডিফল্ট</option>
        <option value="price-low">কম দামে</option>
        <option value="price-high">বেশি দামে</option>
        <option value="discount">বেশি ছাড়ে</option>
        <option value="alpha">নাম অনুযায়ী</option>

<script>
let cart=JSON.parse(localStorage.getItem('alaziz_cart'))||[];
let wishlist=JSON.parse(localStorage.getItem('alaziz_wishlist'))||[];
let filtered=[],currentSort='default';
const PER_PAGE=30; let currentPage=1; let currentCat=null;
function updateCounts(){const c=cart.length;document.getElementById('cartCount').innerText=c;document.getElementById('floatCount').innerText=c;}
updateCounts();
function discPct(b){return b.original_price>b.price?Math.round((b.original_price-b.price)/b.original_price*100):0;}
function getImg(b){const u=(typeof bookImgs!=='undefined'&&bookImgs[b.name])||b.img||'';return (u.indexOf('http')===0||u.indexOf('data:')===0)?u:'book-placeholder.svg';}
/* ═══ স্টক (Firebase থেকে) — স্টক শেষ বই ধূসর + "স্টক শেষ" ব্যাজ ═══ */
window.stockData = window.stockData || {};
function isInStock(idx){ return stockData[idx]!==false; }
(function(){
    var SURL='https://screenshot-2db71-default-rtdb.asia-southeast1.firebasedatabase.app/stock.json';
    fetch(SURL).then(function(r){return r.ok?r.json():null;}).then(function(d){
        stockData=d||{};
        if(typeof renderBooks==='function' && typeof getList==='function') renderBooks(getList());
    }).catch(function(){});
})();
function isWL(name){return wishlist.includes(name);}
function escapeHTML(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toggleWL(e,name){
    e.stopPropagation();
    wishlist.includes(name)?wishlist=wishlist.filter(w=>w!==name):wishlist.push(name);
    localStorage.setItem('alaziz_wishlist',JSON.stringify(wishlist));
    renderBooks(getList());
}
function makeCard(b,delay){
    const pct=discPct(b),idx=books.indexOf(b),wl=isWL(b.name),inStock=isInStock(idx);
    return `<div class="book-card${inStock?'':' oos'}" onclick="goToBook(${idx})" style="animation-delay:${delay*0.04}s">
        ${!inStock?`<div class="disc-badge" style="background:#dc2626;">স্টক শেষ</div>`:(pct>0?`<div class="disc-badge">${pct}% ছাড়</div>`:'')}
        <button class="wl-btn ${wl?'active':''}" data-name="${escapeHTML(b.name)}" onclick="toggleWL(event,this.dataset.name)">${wl?'<svg class="emi" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0" fill="currentColor" stroke="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21S4 15.5 4 9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 8 2.5C20 15.5 12 21 12 21z"/></svg>':'<svg class="emi" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21S4 15.5 4 9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 8 2.5C20 15.5 12 21 12 21z"/></svg>'}</button>
        <img src="${getImg(b)}" alt="বই" loading="lazy" onerror="this.onerror=null;this.src='book-placeholder.svg'" ${inStock?'':'style="filter:grayscale(0.6);opacity:.75;"'}>
        <div class="bc-info">
            <div class="bc-name">${b.name}</div>
            <div class="bc-author">${b.author||b.brand||''}</div>
            <div class="price-row"><span class="price-sell">৳ ${b.price}</span>${b.original_price>b.price?`<span class="price-orig">৳ ${b.original_price}</span>`:''}</div>
            ${inStock
                ?`<button class="bc-btn" data-name="${escapeHTML(b.name)}" data-price="${b.price}" data-img="${escapeHTML(getImg(b))}" onclick="event.stopPropagation();addToCart(this.dataset.name,this.dataset.price,this.dataset.img)">কার্টে যোগ করুন</button>`
                :`<button class="bc-btn" disabled onclick="event.stopPropagation();" style="background:#9ca3af;cursor:not-allowed;opacity:.75;">স্টক শেষ</button>`}
        </div></div>`;
}
function renderBooks(list){
    const grid=document.getElementById('bookGrid');
    document.getElementById('countText').innerText=list.length+'টি বই';
    const pag=document.getElementById('pagination'); if(pag&&!list.length)pag.innerHTML='';
    if(!list.length){
        grid.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="empty-title">কোনো বই পাওয়া যায়নি</div><div class="empty-sub">অন্য কিছু দিয়ে খোঁজার চেষ্টা করুন</div><div class="empty-btn" onclick="clearSearch()">সব দেখুন</div></div>`;
        return;
    }
    const totalPages=Math.ceil(list.length/PER_PAGE);
    if(currentPage>totalPages)currentPage=1;
    const start=(currentPage-1)*PER_PAGE;
    grid.innerHTML=`<div class="grid">${list.slice(start,start+PER_PAGE).map((b,i)=>makeCard(b,i)).join('')}</div>`;
    renderPagination(totalPages);
}
/* ফিল্টার ট্যাব (সকল/ক্যাটাগরি/প্রকাশনী/লেখক) — গ্রন্থকাননের মতো */
let filterTab='all', filterPill='';
function setFilterTab(el,tab){
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    filterTab=tab; filterPill=''; currentPage=1;
    const sc=document.getElementById('subChips');
    if(tab==='all'){ sc.classList.remove('show'); sc.innerHTML=''; }
    else{
        const sets={
            cat:[...new Set(filtered.flatMap(bookCatsF).filter(Boolean))],
            pub:[...new Set(filtered.map(b=>b.pub).filter(Boolean))],
            auth:[...new Set(filtered.map(b=>b.author).filter(Boolean))]
        };
        sc.innerHTML=sets[tab].map(v=>`<div class="chip" data-v="${escapeHTML(v)}" onclick="setPill(this,this.dataset.v)">${escapeHTML(v)}</div>`).join('');
        sc.classList.add('show');
    }
    renderBooks(getList());
}
function setPill(el,val){
    document.querySelectorAll('.sub-chips .chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    filterPill=val; currentPage=1;
    renderBooks(getList());
}
function getList(){
    const q=document.getElementById('filterSearch').value.normalize("NFC").toLowerCase().trim();
    let list=q?filtered.filter(b=>b.name.normalize("NFC").toLowerCase().includes(q)||b.author.normalize("NFC").toLowerCase().includes(q)):[...filtered];
    if(filterPill){
        if(filterTab==='cat') list=list.filter(b=>bookCatsF(b).includes(filterPill));
        else if(filterTab==='pub') list=list.filter(b=>b.pub===filterPill);
        else if(filterTab==='auth') list=list.filter(b=>b.author===filterPill);
    }
    if(currentSort==='price-low')list.sort((a,b)=>a.price-b.price);
    else if(currentSort==='price-high')list.sort((a,b)=>b.price-a.price);
    else if(currentSort==='discount')list.sort((a,b)=>discPct(b)-discPct(a));
    else if(currentSort==='alpha')list.sort((a,b)=>a.name.localeCompare(b.name,'bn'));
    return list;
}
function sortBooksSel(v){currentSort=v;currentPage=1;renderBooks(getList());}
function sortBooks(type,btn){document.querySelectorAll('.sort-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=type;currentPage=1;renderBooks(getList());}
function searchWithin(){document.getElementById('searchClear').classList.toggle('show',document.getElementById('filterSearch').value.length>0);currentPage=1;renderBooks(getList());}
function clearSearch(){document.getElementById('filterSearch').value='';document.getElementById('searchClear').classList.remove('show');currentPage=1;renderBooks(getList());}
function goToBook(idx){
    let r=JSON.parse(localStorage.getItem('alaziz_recent'))||[];
    r=[idx,...r.filter(i=>i!==idx)].slice(0,8);
    localStorage.setItem('alaziz_recent',JSON.stringify(r));
    const b=typeof books!=='undefined'?books[idx]:null;
    navigateTo('AAbook.html?id='+(b&&b.bid?b.bid:idx)); /* bid থাকলে SEO-friendly স্লাগ, না থাকলে পুরনো index */
}
function addToCart(name,price,img){
    cart.push({name:name.trim(),price:Number(price),img});
    localStorage.setItem('alaziz_cart',JSON.stringify(cart));
    updateCounts();showToast('কার্টে যোগ হয়েছে!');
    if(typeof aaRenderCart==='function' && document.getElementById('aaCartDrawer')?.classList.contains('open')) aaRenderCart();
}
function showToast(msg){
    const t=document.createElement('div');t.className='toast';t.innerText=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function goToCart(){
    /* গ্লোবাল কার্ট ড্রয়ার (AAcommon.js) থাকলে সেটিই খোলে */
    if(typeof showCart==='function'){ cart=JSON.parse(localStorage.getItem('alaziz_cart'))||[]; showCart(); return; }
    localStorage.setItem('alaziz_opencart','1');navigateTo('index.html');
}
function goBack(){window.history.back();}
window.addEventListener('scroll',()=>{
    const btn=document.getElementById('scrollTopBtn');
    if(btn)btn.classList.toggle('show',window.scrollY>300);
},{passive:true});
function toBn(n){return String(n).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d]);}
/* বিভাগ→উপ-বিভাগ + ট্যাগ (গ্রন্থকাননের মতো; পুরনো কমা-cat gracefully handle) */
var NF_TAGNAMES=new Set(['Best Selling','Trending','New Arrived','নতুন প্রকাশিত','Pre Order','Best Writer']);
var NF_OLDTAGMAP={'Best Selling':'Best Selling','নতুন প্রকাশিত':'New Arrived','New Arrived':'New Arrived','Best Writer':'Best Writer'};
var NF_TAXO=[['ইসলামি বই',['আকিদা','ফিকহ','হাদিস','তাফসির','সিরাত']],['একাডেমিক বই',['ক্লাস ১-৫','ক্লাস ৬-১০','HSC']],['মাদ্রাসার বই',['নাহু-সরফ','কিতাব']],['Pre Order',[]],['আত্মউন্নয়ন বই',['মোটিভেশন','লিডারশিপ']],['English বই',[]],['প্যাকেজসমূহ',[]],['Sunnah Item',['আতর','মিসওয়াক','পাঞ্জাবি','টুপি','হিজাব']],['Stationery',[]],['খাবার',['মধু','খেজুর','কালোজিরা']]];
function catListNF(b){ if(b&&Array.isArray(b.cats)&&b.cats.length)return b.cats.slice(); return String((b&&b.cat)||'').split(',').map(function(s){return s.trim();}).filter(Boolean); }
function bookCatsF(b){ return catListNF(b).filter(function(c){return !NF_TAGNAMES.has(c);}); }
function bookSubcatF(b){ return (b&&b.subcat)||''; }
function bookTagsF(b){ if(b&&Array.isArray(b.tags))return b.tags; var out=[]; catListNF(b).forEach(function(c){var t=NF_OLDTAGMAP[c]; if(t&&out.indexOf(t)<0)out.push(t);}); return out; }
function catHasNF(b,key){ return bookCatsF(b).indexOf(key)>-1; }
function nfFilterMatch(b,type,value){
    if(type==='tag') return bookTagsF(b).indexOf(value)>-1;
    if(type==='subcat') return bookSubcatF(b)===value;
    if(type==='author') return b.author===value;
    if(type==='pub') return b.pub===value;
    return catHasNF(b,value);
}
function nfSubcatsOf(cat){ for(var i=0;i<NF_TAXO.length;i++){ if(NF_TAXO[i][0]===cat)return NF_TAXO[i][1].slice(); } return []; }
var currentSub='';
var NF_CAT_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c-2-2-5-2-8-1v13c3-1 6-1 8 1 2-2 5-2 8-1V6c-3-1-6-1-8 1z"/></svg>';
function buildCats(){
    /* গণনা শুধু বিভাগ (ট্যাগ-নাম বাদ) */
    const counts={}; books.forEach(b=>{ bookCatsF(b).forEach(function(c){counts[c]=(counts[c]||0)+1;}); });
    const taxo=NF_TAXO.map(function(x){return x[0];});
    const extra=Object.keys(counts).filter(function(c){return taxo.indexOf(c)<0;}).sort((a,b)=>a.localeCompare(b,'bn'));
    const cats=taxo.concat(extra).filter(function(c){return counts[c];});
    const el=document.getElementById('catList'); if(!el)return;
    el.innerHTML=cats.map(function(c){
        const subs=nfSubcatsOf(c);
        const isActive=(c===currentCat);
        let h='<button class="cat-item '+(isActive&&!currentSub?'active':'')+'" data-cat="'+escapeHTML(c)+'" onclick="selectCat(this.dataset.cat)">'+escapeHTML(c)+' <span class="cat-count">('+toBn(counts[c])+')</span></button>';
        if(isActive && subs.length){
            h+='<div class="subcat-wrap">'+subs.map(function(s){
                return '<button class="subcat-item '+(currentSub===s?'active':'')+'" data-sub="'+escapeHTML(s)+'" onclick="selectSubcat(this.dataset.sub)">'+escapeHTML(s)+'</button>';
            }).join('')+'</div>';
        }
        return h;
    }).join('');
}
function selectCat(c){
    currentCat=c; currentSub=''; filtered=books.filter(b=>catHasNF(b,c)); currentPage=1; currentSort='default';
    document.querySelectorAll('.sort-chip').forEach(x=>x.classList.remove('active'));
    document.getElementById('filterSearch').value=''; document.getElementById('searchClear').classList.remove('show');
    document.getElementById('titleText').innerHTML=NF_CAT_ICON+' '+escapeHTML(c);
    document.getElementById('pageTitle').innerText=c;
    buildCats(); renderBooks(getList()); window.scrollTo({top:0,behavior:'smooth'});
}
function selectSubcat(s){
    currentSub=s; filtered=books.filter(b=>catHasNF(b,currentCat) && bookSubcatF(b)===s); currentPage=1; currentSort='default';
    document.getElementById('filterSearch').value=''; document.getElementById('searchClear').classList.remove('show');
    document.getElementById('titleText').innerHTML=NF_CAT_ICON+' '+escapeHTML(currentCat)+' › '+escapeHTML(s);
    document.getElementById('pageTitle').innerText=s;
    buildCats(); renderBooks(getList()); window.scrollTo({top:0,behavior:'smooth'});
}
function pageRange(cur,total){
    const r=[]; if(total<=7){for(let i=1;i<=total;i++)r.push(i);return r;}
    r.push(1); if(cur>3)r.push('...');
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)r.push(i);
    if(cur<total-2)r.push('...'); r.push(total); return r;
}
function renderPagination(total){
    const pag=document.getElementById('pagination'); if(!pag)return;
    if(total<=1){pag.innerHTML='';return;}
    let h=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    pageRange(currentPage,total).forEach(pp=>{ h+= pp==='...' ? '<span class="page-ellipsis">…</span>' : `<button class="page-btn ${pp===currentPage?'active':''}" onclick="goPage(${pp})">${toBn(pp)}</button>`; });
    h+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    pag.innerHTML=h;
}
function goPage(n){
    const list=getList(); const tp=Math.ceil(list.length/PER_PAGE);
    if(n<1||n>tp)return; currentPage=n; renderBooks(list);
    const rb=document.querySelector('.result-bar'); window.scrollTo({top:rb?rb.offsetTop-60:0,behavior:'smooth'});
}
const params=new URLSearchParams(window.location.search);
const type=params.get('type'),value=decodeURIComponent(params.get('value')||'');
const iconMap={cat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c-2-2-5-2-8-1v13c3-1 6-1 8 1 2-2 5-2 8-1V6c-3-1-6-1-8 1z"/></svg>',author:'',pub:''};
if(type)filtered=books.filter(b=>nfFilterMatch(b,type,value));
document.getElementById('titleText').innerHTML=(iconMap[type]||NF_CAT_ICON)+' '+value;
document.getElementById('pageTitle').innerText=value;
currentCat=(type==='cat')?value:null;
currentSub=(type==='subcat')?value:'';
if(type==='subcat'){ /* উপ-বিভাগ URL এলে তার মূল বিভাগও active করি */
    for(var _t=0;_t<NF_TAXO.length;_t++){ if(NF_TAXO[_t][1].indexOf(value)>-1){ currentCat=NF_TAXO[_t][0]; break; } }
}
buildCats();
setTimeout(()=>{document.getElementById('skelGrid').style.display='none';document.getElementById('bookGrid').style.display='block';renderBooks(getList());},600);
/* অ্যাডমিন প্যানেলের লাইভ বুকলিস্ট এলে তালিকা রিফ্রেশ */
if(window.AA_BOOKS_LIVE) AA_BOOKS_LIVE.then(ok=>{
    if(!ok) return;
    if(currentSub) filtered=books.filter(b=>catHasNF(b,currentCat) && bookSubcatF(b)===currentSub);
    else if(type) filtered=books.filter(b=>nfFilterMatch(b,type,value));
    buildCats(); renderBooks(getList());
});

/* ═══ ফিল্টার drawer — বিভাগ + উপ-বিভাগ + ট্যাগ এক মেনুতে (গ্রন্থকাননের মতো) ═══ */
let drawerCategory=null, drawerSub='', drawerTags=[];
/* URL থেকে প্রাথমিক অবস্থা */
drawerCategory=currentCat||null; drawerSub=currentSub||'';
if(type==='tag') drawerTags=[value];
function fdBadge(){
    const n=(drawerCategory?1:0)+(drawerSub?1:0)+drawerTags.length;
    const fc=document.getElementById('filterCount');
    if(fc){ fc.textContent=toBn(n); fc.style.display=n?'inline-block':'none'; }
}
fdBadge();
function openFilterDrawer(){ renderDrawer(); document.getElementById('fdOverlay').classList.add('open'); document.getElementById('filterDrawer').classList.add('open'); document.body.style.overflow='hidden'; }
function closeFilterDrawer(){ document.getElementById('fdOverlay').classList.remove('open'); document.getElementById('filterDrawer').classList.remove('open'); document.body.style.overflow=''; }
function renderDrawer(){
    const counts={}; books.forEach(function(b){ bookCatsF(b).forEach(function(c){counts[c]=(counts[c]||0)+1;}); });
    const taxo=NF_TAXO.map(function(x){return x[0];});
    const extra=Object.keys(counts).filter(function(c){return taxo.indexOf(c)<0;}).sort((a,b)=>a.localeCompare(b,'bn'));
    const cats=taxo.concat(extra).filter(function(c){return counts[c];});
    document.getElementById('fdCats').innerHTML=
        '<div class="fd-opt '+(!drawerCategory?'on':'')+'" onclick="fdSetCat(null)">সব বিভাগ</div>'+
        cats.map(function(c){return '<div class="fd-opt '+(drawerCategory===c?'on':'')+'" data-v="'+escapeHTML(c)+'" onclick="fdSetCat(this.dataset.v)">'+escapeHTML(c)+' ('+toBn(counts[c])+')</div>';}).join('');
    const subs=drawerCategory?nfSubcatsOf(drawerCategory):[];
    document.getElementById('fdSubTitle').style.display=subs.length?'block':'none';
    document.getElementById('fdSubs').innerHTML=subs.length
        ? '<div class="fd-opt '+(!drawerSub?'on':'')+'" onclick="fdSetSub(\'\')">সব</div>'+subs.map(function(s){return '<div class="fd-opt '+(drawerSub===s?'on':'')+'" data-v="'+escapeHTML(s)+'" onclick="fdSetSub(this.dataset.v)">'+escapeHTML(s)+'</div>';}).join('')
        : '';
    document.getElementById('fdTags').innerHTML=['Best Selling','New Arrived','Best Writer'].map(function(t){return '<div class="fd-opt '+(drawerTags.indexOf(t)>-1?'on':'')+'" data-v="'+t+'" onclick="fdToggleTag(this.dataset.v)">'+t+'</div>';}).join('');
}
function fdSetCat(c){ drawerCategory=c||null; drawerSub=''; renderDrawer(); }
function fdSetSub(s){ drawerSub=s||''; renderDrawer(); }
function fdToggleTag(t){ const i=drawerTags.indexOf(t); if(i>-1)drawerTags.splice(i,1); else drawerTags.push(t); renderDrawer(); }
function applyDrawerFilters(){
    filtered=books.filter(function(b){
        if(drawerCategory && !catHasNF(b,drawerCategory)) return false;
        if(drawerSub && bookSubcatF(b)!==drawerSub) return false;
        if(drawerTags.length && !drawerTags.some(function(t){return bookTagsF(b).indexOf(t)>-1;})) return false;
        return true;
    });
    currentCat=drawerCategory; currentSub=drawerSub; currentPage=1; filterPill=''; filterTab='all';
    document.querySelectorAll('.ftab').forEach(function(t,i){t.classList.toggle('active',i===0);});
    const sc=document.getElementById('subChips'); if(sc){sc.classList.remove('show');sc.innerHTML='';}
    fdBadge();
    let t=drawerCategory||'সব আইটেম';
    if(drawerSub)t+=' › '+drawerSub;
    if(drawerTags.length)t+=(drawerCategory||drawerSub?' · ':'')+drawerTags.join(', ');
    document.getElementById('titleText').innerHTML=NF_CAT_ICON+' '+escapeHTML(t);
    document.getElementById('pageTitle').innerText=t;
    closeFilterDrawer();
    renderBooks(getList());
    window.scrollTo({top:0,behavior:'smooth'});
}
</script>
<!-- ফিল্টার drawer -->
<div class="fd-overlay" id="fdOverlay" onclick="closeFilterDrawer()"></div>
<div class="filter-drawer" id="filterDrawer">
    <div class="fd-head"><b>ফিল্টার</b><button class="fd-close" onclick="closeFilterDrawer()">×</button></div>
    <div class="fd-body">
        <div class="fd-sec">বিভাগ</div><div class="fd-opts" id="fdCats"></div>
        <div class="fd-sec" id="fdSubTitle" style="display:none;">উপ-বিভাগ</div><div class="fd-opts" id="fdSubs"></div>
        <div class="fd-sec">ট্যাগ</div><div class="fd-opts" id="fdTags"></div>
    </div>
    <button class="fd-apply" onclick="applyDrawerFilters()">ফিল্টার প্রয়োগ করুন</button>
</div>
<script src="AAcommon.js"></script>
</body>
</html>
