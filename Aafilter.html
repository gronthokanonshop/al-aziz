window.stockData = window.stockData || {};
function isInStock(idx){ return stockData[idx]!==false; }
(function(){
    var SURL='https://screenshot-2db71-default-rtdb.asia-southeast1.firebasedatabase.app/stock.json';
    fetch(SURL).then(function(r){return r.ok?r.json():null;}).then(function(d){
        stockData=d||{};
        if(typeof renderBooks==='function' && typeof getList==='function') renderBooks(getList());
    }).catch(function(){});
})();
function isWL(name){return wishlist.includes(name);}
function escapeHTML(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toggleWL(e,name){
    e.stopPropagation();
    wishlist.includes(name)?wishlist=wishlist.filter(w=>w!==name):wishlist.push(name);
    localStorage.setItem('alaziz_wishlist',JSON.stringify(wishlist));
    renderBooks(getList());
}
function makeCard(b,delay){

    return `<div class="book-card${inStock?'':' oos'}" onclick="goToBook(${idx})" style="animation-delay:${delay*0.04}s">
        ${!inStock?`<div class="disc-badge" style="background:#dc2626;">স্টক শেষ</div>`:(pct>0?`<div class="disc-badge">${pct}% ছাড়</div>`:'')}
        <button class="wl-btn ${wl?'active':''}" data-name="${escapeHTML(b.name)}" onclick="toggleWL(event,this.dataset.name)">${wl?'<svg class="emi" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0" fill="currentColor" stroke="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21S4 15.5 4 9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 8 2.5C20 15.5 12 21 12 21z"/></svg>':'<svg class="emi" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21S4 15.5 4 9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 8 2.5C20 15.5 12 21 12 21z"/></svg>'}</button>
        <img src="${getImg(b)}" alt="বই" loading="lazy" onerror="this.onerror=null;this.src='book-placeholder.svg'" ${inStock?'':'style="filter:grayscale(0.6);opacity:.75;"'}>
        <div class="bc-info">
            <div class="bc-pub">${b.pub}</div>
            <div class="bc-name">${b.name}</div>
            <div class="bc-author">${b.author}</div>
            <div class="price-row"><span class="price-sell">৳ ${b.price}</span>${b.original_price>b.price?`<span class="price-orig">৳ ${b.original_price}</span>`:''}</div>
            ${inStock
                ?`<button class="bc-btn" data-name="${escapeHTML(b.name)}" data-price="${b.price}" data-img="${escapeHTML(getImg(b))}" onclick="event.stopPropagation();addToCart(this.dataset.name,this.dataset.price,this.dataset.img)">কার্টে যোগ করুন</button>`
                :`<button class="bc-btn" disabled onclick="event.stopPropagation();" style="background:#9ca3af;cursor:not-allowed;opacity:.75;">স্টক শেষ</button>`}
        </div></div>`;
}
function renderBooks(list){
    const grid=document.getElementById('bookGrid');
    document.getElementById('countText').innerText=list.length+'টি বই';
    const pag=document.getElementById('pagination'); if(pag&&!list.length)pag.innerHTML='';
    if(!list.length){
        grid.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="empty-title">কোনো বই পাওয়া যায়নি</div><div class="empty-sub">অন্য কিছু দিয়ে খোঁজার চেষ্টা করুন</div><div class="empty-btn" onclick="clearSearch()">সব দেখুন</div></div>`;
        return;
    }
    const totalPages=Math.ceil(list.length/PER_PAGE);
    if(currentPage>totalPages)currentPage=1;
    const start=(currentPage-1)*PER_PAGE;
    grid.innerHTML=`<div class="grid">${list.slice(start,start+PER_PAGE).map((b,i)=>makeCard(b,i)).join('')}</div>`;
    renderPagination(totalPages);
}
function getList(){
    const q=document.getElementById('filterSearch').value.normalize("NFC").toLowerCase().trim();
    let list=q?filtered.filter(b=>b.name.normalize("NFC").toLowerCase().includes(q)||b.author.normalize("NFC").toLowerCase().includes(q)):[...filtered];
    if(currentSort==='price-low')list.sort((a,b)=>a.price-b.price);
    else if(currentSort==='price-high')list.sort((a,b)=>b.price-a.price);
    else if(currentSort==='discount')list.sort((a,b)=>discPct(b)-discPct(a));
    else if(currentSort==='alpha')list.sort((a,b)=>a.name.localeCompare(b.name,'bn'));
    return list;
}
function sortBooksSel(v){currentSort=v;currentPage=1;renderBooks(getList());}
function sortBooks(type,btn){document.querySelectorAll('.sort-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=type;currentPage=1;renderBooks(getList());}
function searchWithin(){document.getElementById('searchClear').classList.toggle('show',document.getElementById('filterSearch').value.length>0);currentPage=1;renderBooks(getList());}
function clearSearch(){document.getElementById('filterSearch').value='';document.getElementById('searchClear').classList.remove('show');currentPage=1;renderBooks(getList());}
function goToBook(idx){
    let r=JSON.parse(localStorage.getItem('alaziz_recent'))||[];
    r=[idx,...r.filter(i=>i!==idx)].slice(0,8);
    localStorage.setItem('alaziz_recent',JSON.stringify(r));
    navigateTo('AAbook.html?id='+idx);
}
function addToCart(name,price,img){
    cart.push({name:name.trim(),price:Number(price),img});
    localStorage.setItem('alaziz_cart',JSON.stringify(cart));
    updateCounts();showToast('কার্টে যোগ হয়েছে!');
    if(typeof aaRenderCart==='function' && document.getElementById('aaCartDrawer')?.classList.contains('open')) aaRenderCart();
}
function showToast(msg){
    const t=document.createElement('div');t.className='toast';t.innerText=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function goToCart(){
    /* গ্লোবাল কার্ট ড্রয়ার (AAcommon.js) থাকলে সেটিই খোলে */
    if(typeof showCart==='function'){ cart=JSON.parse(localStorage.getItem('alaziz_cart'))||[]; showCart(); return; }
    localStorage.setItem('alaziz_opencart','1');navigateTo('index.html');
}
function goBack(){window.history.back();}
window.addEventListener('scroll',()=>{
    const btn=document.getElementById('scrollTopBtn');
    if(btn)btn.classList.toggle('show',window.scrollY>300);
},{passive:true});
function toBn(n){return String(n).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d]);}
/* একটি বই একাধিক ক্যাটাগরিতে থাকতে পারে (cat কমা দিয়ে আলাদা) */
function catListNF(b){return String(b.cat||'').split(',').map(function(s){return s.trim();}).filter(Boolean);}
function catHasNF(b,key){return catListNF(b).indexOf(key)>-1;}
function buildCats(){
    const counts={}; books.forEach(b=>{catListNF(b).forEach(function(c){counts[c]=(counts[c]||0)+1;});});
    const cats=Object.keys(counts).sort((a,b)=>a.localeCompare(b,'bn'));
    const el=document.getElementById('catList'); if(!el)return;
    el.innerHTML=cats.map(c=>`<button class="cat-item ${c===currentCat?'active':''}" data-cat="${escapeHTML(c)}" onclick="selectCat(this.dataset.cat)">${escapeHTML(c)} <span class="cat-count">(${toBn(counts[c])})</span></button>`).join('');
}
function selectCat(c){
    currentCat=c; filtered=books.filter(b=>catHasNF(b,c)); currentPage=1; currentSort='default';
    document.querySelectorAll('.sort-chip').forEach(x=>x.classList.remove('active'));
    document.getElementById('filterSearch').value=''; document.getElementById('searchClear').classList.remove('show');
    const icon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c-2-2-5-2-8-1v13c3-1 6-1 8 1 2-2 5-2 8-1V6c-3-1-6-1-8 1z"/></svg>';
    document.getElementById('titleText').innerHTML=icon+' '+escapeHTML(c);
    document.getElementById('pageTitle').innerText=c;
    buildCats(); renderBooks(getList()); window.scrollTo({top:0,behavior:'smooth'});
}
function pageRange(cur,total){
    const r=[]; if(total<=7){for(let i=1;i<=total;i++)r.push(i);return r;}
    r.push(1); if(cur>3)r.push('...');
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)r.push(i);
    if(cur<total-2)r.push('...'); r.push(total); return r;
}
function renderPagination(total){
    const pag=document.getElementById('pagination'); if(!pag)return;
    if(total<=1){pag.innerHTML='';return;}
    let h=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    pageRange(currentPage,total).forEach(pp=>{ h+= pp==='...' ? '<span class="page-ellipsis">…</span>' : `<button class="page-btn ${pp===currentPage?'active':''}" onclick="goPage(${pp})">${toBn(pp)}</button>`; });
    h+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    pag.innerHTML=h;
}
function goPage(n){
    const list=getList(); const tp=Math.ceil(list.length/PER_PAGE);
    if(n<1||n>tp)return; currentPage=n; renderBooks(list);
    const rb=document.querySelector('.result-bar'); window.scrollTo({top:rb?rb.offsetTop-60:0,behavior:'smooth'});
}
const params=new URLSearchParams(window.location.search);
const type=params.get('type'),value=decodeURIComponent(params.get('value')||'');
const iconMap={cat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c-2-2-5-2-8-1v13c3-1 6-1 8 1 2-2 5-2 8-1V6c-3-1-6-1-8 1z"/></svg>',author:'',pub:''};
if(type==='cat')filtered=books.filter(b=>catHasNF(b,value));
else if(type==='author')filtered=books.filter(b=>b.author===value);
else if(type==='pub')filtered=books.filter(b=>b.pub===value);
document.getElementById('titleText').innerHTML=(iconMap[type]||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c-2-2-5-2-8-1v13c3-1 6-1 8 1 2-2 5-2 8-1V6c-3-1-6-1-8 1z"/></svg>')+' '+value;
document.getElementById('pageTitle').innerText=value;
currentCat=(type==='cat')?value:null; buildCats();
setTimeout(()=>{document.getElementById('skelGrid').style.display='none';document.getElementById('bookGrid').style.display='block';renderBooks(getList());},600);
/* অ্যাডমিন প্যানেলের লাইভ বুকলিস্ট এলে তালিকা রিফ্রেশ */
if(window.AA_BOOKS_LIVE) AA_BOOKS_LIVE.then(ok=>{
    if(!ok) return;
    if(currentCat) filtered=books.filter(b=>catHasNF(b,currentCat));
    else if(type==='author') filtered=books.filter(b=>b.author===value);
    else if(type==='pub') filtered=books.filter(b=>b.pub===value);
    buildCats(); renderBooks(getList());
});
</script>
<script src="AAcommon.js"></script>
</body>
</html>
